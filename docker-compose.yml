version: "3.8"
services:
  app:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [redis, postgres]
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wraithwall
      POSTGRES_PASSWORD: wraithwall
      POSTGRES_DB: wraithwall
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    restart: unless-stopped
volumes:
  redis_data:
  pg_data:
