name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[all]"
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Run SAST scanner against fixture set
        run: |
          echo "import os" > /tmp/fixture.py
          echo 'API_KEY = "sk-abcdefghijklmnop"' >> /tmp/fixture.py
          echo "os.system('rm -rf /')" >> /tmp/fixture.py
          raven scan /tmp --output /tmp/fixture_output --format json --quiet
          python -c "import json; r=json.load(open('/tmp/fixture_output/SecurityReport.json')); assert len(r['findings']) >= 2, f'Expected >=2 findings, got {len(r[\"findings\"])}'"
      - name: Verify multi-language analyzers
        run: python -m pytest tests/test_plugins_security.py -v
